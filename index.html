<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online Menu</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: auto; padding: 20px; background: #fff; }
    h1, h2 { color: #333; }
    .section { margin-bottom: 30px; }
    .item { margin-bottom: 15px; }
    .item-title { font-weight: bold; font-size: 1.1em; }
    .item-info { font-size: 0.9em; color: #555; margin: 3px 0; }
    .price { font-weight: bold; margin-top: 2px; color: #000; }
  </style>
</head>
<body>
  <h1>Menu</h1>

  <div class="section">
    <h2>Starters</h2>
    <div class="item">
      <div class="item-title">Falafel Salad</div>
      <div class="item-info">531 Kcal / Protein 11g<br />Falafel, cherry tomato, lettuce, chickpeas, labneh sauce, crispy tortilla bread.</div>
      <div class="price">21 AED</div>
    </div>
    <!-- Repeat for other items -->
  </div>

  <!-- Add other sections (Sandwiches, Bowls, Eggs, etc) -->

</body>
</html>
